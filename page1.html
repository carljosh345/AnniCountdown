<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Since We Met</title>
    <link rel="stylesheet" href="styles/page1.css">
</head>
<body>
<div class="container">
    <h1>Time Since We Met</h1>
    <div id="countdown">
        <div class="time-box">
            <span id="days">00</span>
            <p>Days</p>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <p>Hours</p>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <p>Minutes</p>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <p>Seconds</p>
        </div>
    </div>
    <h2 id="message">and counting...</h2>
    <p class="copyright-text">with love by Weya</p>
</div>
    <script src="javascript/page1.js"></script>
</body>
</html>
